<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Cloud Diagnostic Tool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        #console {
            background-color: #1a1a1a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            min-height: 300px;
        }
        .log-error { color: #ff4444; }
        .log-success { color: #00ff00; }
        .log-warn { color: #ffff00; }
        .log-info { color: #00ffff; }
    </style>
</head>
<body class="bg-gray-100 p-5">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-xl shadow-lg border-2 border-blue-500">
            <h1 class="text-2xl font-bold mb-4 text-gray-800">🛠️ مختبر الربط بالسحابة (X-Tester)</h1>
            
            <div class="grid grid-cols-1 gap-4">
                <div>
                    <label class="block text-sm font-semibold mb-1">Project URL:</label>
                    <input type="text" id="test-url" value="https://pyrcpouvcvjkgpjyuafz.supabase.co" 
                           class="w-full p-2 border rounded font-mono text-sm bg-gray-50">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1">Anon Key:</label>
                    <input type="text" id="test-key" placeholder="أدخل مفتاح anon هنا..."
                           class="w-full p-2 border rounded font-mono text-xs bg-gray-50">
                </div>
                <button id="run-test" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition">
                    تشغيل فحص الاتصال وتحليل الأخطاء
                </button>
            </div>
        </div>

        <div class="rounded-xl overflow-hidden shadow-2xl border-2 border-black">
            <div class="bg-black p-2 flex justify-between items-center px-4">
                <span class="text-white text-xs font-bold font-mono">X-CORE SYSTEM CONSOLE [DEBUG MODE]</span>
                <button onclick="document.getElementById('console').innerHTML = ''" class="text-red-500 text-xs">Clear</button>
            </div>
            <div id="console" class="p-4 text-sm overflow-y-auto max-h-[400px]">
                > بانتظار تشغيل الفحص...
            </div>
        </div>
    </div>

    <script>
        const consoleEl = document.getElementById('console');

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = `mb-1 ${'log-' + type}`;
            div.innerHTML = `[${time}] ${message}`;
            consoleEl.appendChild(div);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        document.getElementById('run-test').onclick = async function() {
            const url = document.getElementById('test-url').value.trim();
            const key = document.getElementById('test-key').value.trim();
            const btn = this;

            btn.disabled = true;
            btn.innerText = "جاري الفحص...";
            consoleEl.innerHTML = ""; // مسح الكونسول

            log("🚀 بدء عملية الفحص والتحليل...", 'info');

            // 1. فحص تحميل المكتبة
            if (typeof supabase === 'undefined') {
                log("❌ خطأ حرج: مكتبة Supabase لم يتم تحميلها من الـ CDN!", 'error');
                log("💡 الحل: تأكد من اتصال الإنترنت أو استخدم رابط CDN آخر في الـ HTML.", 'warn');
                finish(); return;
            }
            log("✅ تم العثور على مكتبة Supabase بنجاح.", 'success');

            // 2. محاولة إنشاء العميل
            let testSupabase;
            try {
                testSupabase = supabase.createClient(url, key);
                log("✅ تم إنشاء كائن العميل (Client) برمجياً.", 'success');
            } catch (e) {
                log(`❌ فشل إنشاء العميل: ${e.message}`, 'error');
                finish(); return;
            }

            // 3. فحص الاتصال الفعلي (محاولة سحب بيانات)
            log("📡 محاولة الاتصال بجدول 'licenses' وسحب البيانات...", 'info');
            
            const start = performance.now();
            try {
                const { data, error, status, statusText } = await testSupabase
                    .from('licenses')
                    .select('count')
                    .limit(1);

                const end = performance.now();
                log(`🕒 زمن الاستجابة: ${Math.round(end - start)}ms`, 'info');

                if (error) {
                    log(`❌ خطأ من السحابة (Status: ${status} - ${statusText})`, 'error');
                    analyzeError(error, status);
                } else {
                    log("🎉 نجاح باهر! الاتصال بالسحابة يعمل 100% والبيانات وصلت.", 'success');
                    log(`📦 نتيجة الفحص: تم العثور على بيانات (Count: ${JSON.stringify(data)})`, 'info');
                }
            } catch (e) {
                log("❌ خطأ غير متوقع في طلب الـ Fetch!", 'error');
                log(`📝 تفاصيل الخطأ: ${e.message}`, 'error');
                analyzeError(e);
            }

            finish();
        };

        function analyzeError(error, status) {
            log("🔍 تحليل المشكلة...", 'warn');
            
            if (status === 403) {
                log("🚨 تشخيص: مشكلة حماية (RLS Policy)!", 'error');
                log("💡 السبب: السحابة متصلة، لكنها ترفض إعطاءك البيانات لأنك لم تفعل سياسة الوصول (Policy) لليوزر 'anon' على جدول licenses.", 'warn');
                log("🛠️ الحل: اذهب لـ Supabase -> Authentication -> Policies وأضف سياسة SELECT للجميع.", 'info');
            } 
            else if (error.message && error.message.includes('fetch')) {
                log("🚨 تشخيص: مشكلة اتصال شبكة أو رابط (URL) خطأ!", 'error');
                log("💡 السبب: المتصفح لا يستطيع الوصول للرابط. قد يكون الرابط ناقصاً أو الإنترنت محجوباً.", 'warn');
            }
            else if (status === 401 || status === 400) {
                log("🚨 تشخيص: مفتاح Anon غير صالح!", 'error');
                log("💡 السبب: الـ Key الذي استخدمته قد يكون قديماً أو ناقصاً حرفاً واحداً.", 'warn');
            }
            else {
                log(`🚨 تشخيص غير معروف: ${error.message || 'راجع الكونسول الرئيسي للمتصفح (F12)'}`, 'error');
            }
        }

        function finish() {
            const btn = document.getElementById('run-test');
            btn.disabled = false;
            btn.innerText = "تشغيل فحص الاتصال وتحليل الأخطاء";
            log("🔚 انتهى الفحص.", 'info');
        }
    </script>
</body>
</html>
