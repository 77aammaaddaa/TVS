<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFine POS X-Lite</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <style>
        /* إخفاء الشاشات التي لا تعمل حالياً */
        .hidden-screen { display: none !important; }
        /* تحسين شكل شريط التمرير */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans h-screen overflow-hidden selection:bg-blue-200">

    <div id="activation-screen" class="flex items-center justify-center h-full bg-slate-900 hidden-screen">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">EcoFine <span class="text-blue-600">X-Lite</span></h1>
            <p class="text-gray-500 mb-6">نظام نقاط البيع السحابي الهجين</p>
            
            <div class="mb-4">
                <input type="text" id="license-input" placeholder="أدخل كود التفعيل هنا..." 
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center font-mono text-lg" dir="ltr">
            </div>
            <button id="activate-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition duration-200">
                تفعيل النظام
            </button>
            <p id="activation-msg" class="mt-4 text-sm text-red-500 font-semibold"></p>
        </div>
    </div>

    <div id="pos-screen" class="h-full flex flex-col hidden-screen">
        <header class="bg-slate-800 text-white p-4 flex justify-between items-center shadow-md z-10">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-bold">EcoFine POS</h1>
                <span id="sync-status" class="px-3 py-1 bg-green-500/20 text-green-400 text-xs rounded-full border border-green-500/50 flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> متصل ومزامن
                </span>
            </div>
            <div class="flex items-center gap-4">
                <input type="file" id="excel-file-input" accept=".xlsx, .xls" class="hidden">
                <button id="import-excel-btn" class="bg-slate-700 hover:bg-slate-600 text-sm py-2 px-4 rounded-md transition">
                    📥 استيراد مخزون
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            
            <div class="w-2/3 flex flex-col p-4 bg-gray-50">
                <div class="mb-4">
                    <input type="text" id="search-input" placeholder="ابحث عن منتج بالاسم أو الباركود..." 
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
                </div>
                <div id="product-grid" class="flex-1 overflow-y-auto grid grid-cols-3 lg:grid-cols-4 gap-4 p-2">
                    </div>
            </div>

            <div class="w-1/3 bg-white border-r border-gray-200 flex flex-col shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)]">
                <h2 class="text-lg font-bold p-4 border-b bg-slate-50 text-slate-700">سلة المبيعات (الفاتورة)</h2>
                
                <div id="cart-items" class="flex-1 overflow-y-auto p-2">
                    </div>

                <div class="p-4 bg-slate-50 border-t border-gray-200 space-y-3">
                    <div class="flex justify-between text-gray-600">
                        <span>المجموع الفرعي:</span>
                        <span id="cart-subtotal" class="font-bold">0.00</span>
                    </div>
                    <div class="flex justify-between items-center text-gray-600">
                        <span>الخصم:</span>
                        <input type="number" id="cart-discount" value="0" min="0" class="w-20 px-2 py-1 border rounded text-left focus:ring-1 focus:ring-blue-500 outline-none">
                    </div>
                    <div class="flex justify-between text-xl font-bold text-blue-700 pt-2 border-t">
                        <span>الإجمالي:</span>
                        <span id="cart-total">0.00</span>
                    </div>
                    <button id="checkout-btn" class="w-full mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition duration-200 text-lg">
                        دفع الفاتورة
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="superadmin-screen" class="absolute inset-0 bg-slate-900/95 z-50 flex items-center justify-center hidden-screen">
        <div class="bg-white w-3/4 max-w-4xl rounded-2xl shadow-2xl overflow-hidden flex flex-col h-3/4">
            <div class="bg-red-600 text-white p-4 flex justify-between items-center">
                <h2 class="text-xl font-bold flex items-center gap-2">🛡️ لوحة تحكم السوبر أدمن (X-Core)</h2>
                <button id="admin-close-btn" class="hover:bg-red-700 p-2 rounded">إغلاق</button>
            </div>
            <div class="p-6 flex-1 overflow-y-auto bg-gray-50">
                <div class="flex gap-4 mb-6">
                    <button id="generate-key-btn" class="bg-slate-800 text-white px-6 py-2 rounded-lg hover:bg-slate-700 font-bold">
                        ➕ توليد كود تفعيل جديد
                    </button>
                    <div id="new-key-display" class="flex-1 bg-green-100 text-green-800 px-4 py-2 rounded-lg border border-green-300 font-mono text-center hidden">
                        </div>
                </div>
                <div class="bg-white rounded-lg shadow border">
                    <table class="w-full text-right">
                        <thead class="bg-gray-100 border-b">
                            <tr>
                                <th class="p-3">معرف العميل (Tenant ID)</th>
                                <th class="p-3">كود التفعيل</th>
                                <th class="p-3">تاريخ الانتهاء</th>
                                <th class="p-3">الحالة</th>
                                <th class="p-3">إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="licenses-list" class="divide-y">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>



    <    <script src="database.js"></script>


    <script src="superadmin.js"></script>


    <script src="app.js"></script>



</body>

</html>
