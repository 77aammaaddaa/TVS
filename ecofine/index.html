<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoFine Pro ERP - X-Holding Master V4 (Advanced Policy)</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans Arabic', sans-serif; background: #f1f5f9; height: 100vh; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.5); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .modal-overlay { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(4px); }
        .login-bg { background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, useRef, createContext, useContext } = React;

        // UTILITIES
        const generateID = (prefix) => `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).substr(2, 9)}`.toUpperCase();
        const isValidPhone = (phone) => /^01[0125][0-9]{8}$/.test(phone);
        const isValidNationalID = (nid) => /^\d{14}$/.test(nid.replace(/\D/g, ''));
        const formatMoney = (amount) => Number(amount || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        const hashPassword = async (password) => {
            const msgBuffer = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        };

        const DateUtils = {
            today: () => new Date().toISOString().split('T')[0],
            diffDays: (d1, d2) => Math.floor((new Date(d2) - new Date(d1)) / (1000 * 60 * 60 * 24)),
            addMonths: (dateStr, months) => {
                const d = new Date(dateStr); d.setMonth(d.getMonth() + months); return d.toISOString().split('T')[0];
            },
            getDelayStatus: (dueDate, systemType, totalLateDays) => {
                const daysLate = Math.max(0, DateUtils.diffDays(dueDate, DateUtils.today()));
                const accumulated = totalLateDays + daysLate;
                
                if (daysLate <= 0) return { status: 'regular', label: 'منتظم', color: 'bg-slate-200 text-slate-700', days: 0 };
                
                if (systemType === 'daily') {
                    if (accumulated >= 35) return { status: 'danger', label: 'مطلوب قانونياً (تخطى 35)', color: 'bg-black text-white', days: daysLate, warning: true };
                    if (accumulated >= 30) return { status: 'late_2', label: 'إنذار أخير (تخطى 30)', color: 'bg-red-600 text-white', days: daysLate, warning: true };
                } else {
                    if (accumulated >= 63) return { status: 'danger', label: 'مطلوب قانونياً (تخطى 63)', color: 'bg-black text-white', days: daysLate, warning: true };
                    if (accumulated >= 60) return { status: 'late_2', label: 'إنذار أخير (تخطى 60)', color: 'bg-red-600 text-white', days: daysLate, warning: true };
                }
                
                if (daysLate <= 10) return { status: 'late_1', label: 'متأخر (تحذير أول)', color: 'bg-yellow-500 text-white', days: daysLate };
                return { status: 'late_2', label: 'متأخر (تحذير متكرر)', color: 'bg-orange-500 text-white', days: daysLate };
            }
        };

        const EventBus = {
            listeners: {},
            on: (event, callback) => { if (!EventBus.listeners[event]) EventBus.listeners[event] = []; EventBus.listeners[event].push(callback); },
            off: (event, callback) => { if (EventBus.listeners[event]) EventBus.listeners[event] = EventBus.listeners[event].filter(cb => cb !== callback); },
            emit: (event, detail) => { if (EventBus.listeners[event]) EventBus.listeners[event].forEach(cb => cb(detail)); }
        };

        // ICONS
        const Icon = React.memo(({ name, size = 20, className = "" }) => {
            const icons = {
                Dashboard: <path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />,
                ShoppingCart: <path strokeLinecap="round" strokeLinejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />,
                Wallet: <path strokeLinecap="round" strokeLinejoin="round" d="M12 8c-1.657 0-3 1.343-3 3s1.343 3 3 3 3-1.343 3-3-1.343-3-3-3z M2 17l10 5 10-5M2 12l10 5 10-5M12 2l10 5-10 5L2 7l10-5z" />,
                Users: <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />,
                Inventory: <path strokeLinecap="round" strokeLinejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4" />,
                Legal: <path strokeLinecap="round" strokeLinejoin="round" d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3" />,
                Check: <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />,
                X: <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />,
                Plus: <path strokeLinecap="round" strokeLinejoin="round" d="M12 4v16m8-8H4" />,
                Edit: <path strokeLinecap="round" strokeLinejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />,
            };
            return <svg className={className} width={size} height={size} fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2">{icons[name] || <circle cx="12" cy="12" r="10" />}</svg>;
        });

        // APP CONTEXT
        const AppContext = createContext();
        const useAppContext = () => useContext(AppContext);
        const UIProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            const [modalContent, setModalContent] = useState(null);

            const showToast = useCallback((msg, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            }, []);

            const confirmAction = useCallback((message, onConfirm) => setModalContent({ type: 'confirm', message, onConfirm }), []);
            const closeModal = useCallback(() => setModalContent(null), []);

            return (
                <AppContext.Provider value={{ showToast, confirmAction, closeModal }}>
                    {children}
                    <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`toast-enter flex items-center gap-3 px-5 py-3 rounded-xl shadow-xl text-white font-bold text-sm ${t.type === 'error' ? 'bg-red-600' : t.type === 'warning' ? 'bg-yellow-600' : 'bg-slate-800'}`}>
                                <Icon name={t.type === 'error' ? 'X' : t.type === 'warning' ? 'Dashboard' : 'Check'} size={18} />{t.msg}
                            </div>
                        ))}
                    </div>
                    {modalContent && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4" onClick={closeModal}>
                            <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl p-6" onClick={e => e.stopPropagation()}>
                                <h3 className="text-lg font-black text-slate-800 mb-4">{modalContent.message}</h3>
                                <div className="flex justify-end gap-3 mt-6">
                                    <button onClick={closeModal} className="px-6 py-3 rounded-xl bg-slate-200 font-bold">إلغاء</button>
                                    <button onClick={() => { modalContent.onConfirm(); closeModal(); }} className="px-6 py-3 rounded-xl bg-blue-600 text-white font-bold">تأكيد</button>
                                </div>
                            </div>
                        </div>
                    )}
                </AppContext.Provider>
            );
        };

        // DATABASE ENGINE (IndexedDB)
        const SCHEMA = {
            users: { prefix: 'USR' },
            customers: { prefix: 'CNT' },
            products: { prefix: 'PRD' },
            sales_invoices: { prefix: 'INV' },
            sales_items: { prefix: 'SLI' },
            installments: { prefix: 'INS' },
            payments: { prefix: 'PAY' },
            treasury: { prefix: 'TRZ' },
            expenses: { prefix: 'EXP' },
            journal: { prefix: 'JRN' },
            legal_cases: { prefix: 'LGL' },
            guarantors: { prefix: 'GRT' }
        };

        const dbEngine = {
            db: null,
            init: function() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open('EcoFine_Master_DB_V6', 6);
                    req.onupgradeneeded = (e) => {
                        const d = e.target.result;
                        Object.keys(SCHEMA).forEach(t => { if (!d.objectStoreNames.contains(t)) d.createObjectStore(t, { keyPath: 'id' }); });
                    };
                    req.onsuccess = async (e) => { this.db = e.target.result; await this.seedInitialAdmin(); resolve(); };
                    req.onerror = (err) => reject("DB Error: " + err);
                });
            },
            seedInitialAdmin: async function() {
                const users = await this.fetch('users');
                if (users.length === 0) {
                    const hash = await hashPassword('admin123');
                    await this.insert('users', { username: 'admin', password: hash, full_name: 'المدير التنفيذي', role: 'admin', status: 'نشط' });
                }
            },
            fetch: function(table) {
                return new Promise((resolve, reject) => {
                    const req = this.db.transaction(table, 'readonly').objectStore(table).getAll();
                    req.onsuccess = () => resolve(req.result || []);
                    req.onerror = () => reject(`Fetch error ${table}`);
                });
            },
            get: function(table, id) {
                return new Promise((resolve, reject) => {
                    const req = this.db.transaction(table, 'readonly').objectStore(table).get(id);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject("Get error");
                });
            },
            insert: function(table, data) {
                return new Promise((resolve, reject) => {
                    const id = generateID(SCHEMA[table].prefix);
                    const rec = { ...data, id, created_at: new Date().toISOString() };
                    const req = this.db.transaction(table, 'readwrite').objectStore(table).add(rec);
                    req.onsuccess = () => { EventBus.emit('db_update'); resolve(rec); };
                    req.onerror = () => reject("Insert error");
                });
            },
            update: async function(table, id, data) {
                const existing = await this.get(table, id);
                if (!existing) throw new Error('Not found');
                const updatedRec = { ...existing, ...data, id, updated_at: new Date().toISOString() };
                return new Promise((resolve, reject) => {
                    const req = this.db.transaction(table, 'readwrite').objectStore(table).put(updatedRec);
                    req.onsuccess = () => { EventBus.emit('db_update'); resolve(updatedRec); };
                    req.onerror = () => reject('Update error');
                });
            },
            checkUnique: async function(table, field, value, excludeId = null) {
                const all = await this.fetch(table); return !all.some(item => item[field] === value && item.id !== excludeId);
            }
        };

        const LogicEngine = {
            updateCustomerScore: async (customer_id, isLate, penalty = 0) => {
                const c = await dbEngine.get('customers', customer_id);
                if (c && c.status !== 'إجراء قانوني') {
                    let newScore = c.credit_score || 50; // يبدأ من 50
                    if (!isLate) newScore = Math.min(100, newScore + 5);
                    else newScore = Math.max(0, newScore - penalty);
                    
                    let newStatus = c.status;
                    if (newScore === 0) newStatus = 'خطر';
                    else if (newScore < 40) newStatus = 'متعثر';
                    
                    await dbEngine.update('customers', c.id, { ...c, credit_score: newScore, status: newStatus });
                }
            },
            checkGuarantorEligibility: async (customer_id) => {
                const invs = await dbEngine.fetch('sales_invoices');
                const grts = await dbEngine.fetch('guarantors');
                // لا يمكن أن يكون مشتري نشط أو ضامن نشط
                const isActiveBuyer = invs.some(i => i.customer_id === customer_id && ['سارية', 'متعثر'].includes(i.status));
                const isActiveGuarantor = grts.some(g => g.customer_id === customer_id && g.status === 'active');
                return !isActiveBuyer && !isActiveGuarantor;
            }
        };

        // COMPONENTS
        const Input = React.memo(({ label, type = "text", className = "", ...props }) => (
            <div className={`w-full ${className}`}>
                {label && <label className="block text-xs font-bold text-slate-600 mb-1.5">{label}</label>}
                <input type={type} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-blue-500/20" {...props} />
            </div>
        ));

        const Select = React.memo(({ label, options, className = "", ...props }) => (
            <div className={`w-full ${className}`}>
                {label && <label className="block text-xs font-bold text-slate-600 mb-1.5">{label}</label>}
                <select className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:bg-white focus:ring-2 focus:ring-blue-500/20" {...props}>
                    <option value="">-- اختر --</option>
                    {options.map((o, i) => <option key={i} value={o.value || o}>{o.label || o}</option>)}
                </select>
            </div>
        ));

        const Button = React.memo(({ children, onClick, variant = "primary", className = "", icon, type = "button", disabled = false }) => {
            const variants = { primary: "bg-blue-600 text-white hover:bg-blue-700", success: "bg-green-600 text-white hover:bg-green-700", danger: "bg-red-600 text-white hover:bg-red-700" };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`flex items-center justify-center gap-2 py-3 px-6 rounded-xl font-bold transition-all disabled:opacity-60 ${variants[variant]} ${className}`}>
                    {icon && <Icon name={icon} size={18} />}{children}
                </button>
            );
        });

        const Modal = ({ title, isOpen, onClose, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center modal-overlay p-4" onClick={onClose}>
                    <div className="bg-white rounded-2xl w-full max-w-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]" onClick={e => e.stopPropagation()}>
                        <div className="p-5 border-b flex justify-between items-center bg-slate-50">
                            <h2 className="text-xl font-black text-slate-800">{title}</h2>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full"><Icon name="X" size={18} /></button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">{children}</div>
                    </div>
                </div>
            );
        };

        // MODULES
        const LoginModule = ({ onLogin }) => {
            const { showToast } = useAppContext();
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                const users = await dbEngine.fetch('users');
                const user = users.find(u => u.username === username.trim().toLowerCase());
                if (user) {
                    const inputHash = await hashPassword(password);
                    if (user.password === inputHash) return onLogin(user);
                }
                showToast('بيانات غير صحيحة', 'error');
            };

            return (
                <div className="h-screen w-full flex items-center justify-center login-bg">
                    <div className="glass p-10 rounded-3xl shadow-2xl w-full max-w-md z-10 text-white">
                        <div className="text-center mb-10"><div className="w-16 h-16 mx-auto bg-blue-600 rounded-2xl flex items-center justify-center font-black text-3xl mb-4">X</div><h1 className="text-2xl font-black">EcoFine V4</h1></div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <Input label="المستخدم" required value={username} onChange={e => setUsername(e.target.value)} />
                            <Input label="المرور" type="password" required value={password} onChange={e => setPassword(e.target.value)} />
                            <Button type="submit" className="w-full mt-4" icon="Check">دخول</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const SalesModule = ({ user }) => {
            const { showToast } = useAppContext();
            const [products, setProducts] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [cart, setCart] = useState([]);
            const [form, setForm] = useState({ cust: '', type: 'monthly', period: 10, guarantors: [] });

            const load = useCallback(async () => {
                setProducts(await dbEngine.fetch('products'));
                setCustomers(await dbEngine.fetch('customers'));
            }, []);
            useEffect(() => { load(); }, [load]);

            const addToCart = (p) => {
                if (p.stock <= 0) return showToast('نفذ من المخزن', 'error');
                setCart(prev => {
                    const ex = prev.find(i => i.id === p.id);
                    if (ex) return prev.map(i => i.id === p.id ? { ...i, qty: i.qty + 1 } : i);
                    return [...prev, { ...p, qty: 1 }];
                });
            };

            const total = cart.reduce((a, b) => a + (form.type === 'cash' ? Number(b.cash_price) : Number(b.installment_price)) * b.qty, 0);

            // حساب التقديمة (Downpayment)
            const calcDownPayment = () => {
                if (form.type === 'cash') return total;
                const d = new Date();
                const day = d.getDate();
                if (form.type === 'daily') {
                    const dailyInst = total / form.period / 30; // افتراض 30 يوم
                    return day * dailyInst; 
                }
                return total / form.period; // قسط شهر كامل
            };

            const executeSale = async () => {
                if (!form.cust || cart.length === 0) return showToast('اكمل البيانات', 'error');
                if (form.type !== 'cash' && total < 2500) return showToast('الحد الأدنى للتقسيط 2500 ج', 'error');
                if (form.type !== 'cash' && form.guarantors.length < 1) return showToast('يجب توفر ضامن واحد على الأقل', 'error');
                
                if (form.type !== 'cash') {
                    if (total <= 100000 && form.period > 10) return showToast('أقصى مدة أقل من 100ألف هي 10 شهور', 'error');
                    if (total > 100000 && form.period > 15) return showToast('أقصى مدة هي 15 شهر', 'error');
                }

                try {
                    const dp = calcDownPayment();
                    const rem = total - dp;
                    const date = DateUtils.today();

                    const inv = await dbEngine.insert('sales_invoices', {
                        customer_id: form.cust, type: form.type, total, down_payment: dp,
                        paid: dp, remaining: rem, period: form.period, date, status: rem > 0 ? 'سارية' : 'خالصة',
                        system_type: form.type
                    });

                    for (let g of form.guarantors) {
                        await dbEngine.insert('guarantors', { invoice_id: inv.id, customer_id: g, status: 'active' });
                    }

                    if (rem > 0) {
                        const instAmt = rem / form.period;
                        for (let i = 1; i <= form.period; i++) {
                            await dbEngine.insert('installments', {
                                invoice_id: inv.id, customer_id: form.cust, amount: instAmt,
                                paid_amount: 0, due_date: DateUtils.addMonths(date, i), status: 'pending', type: form.type
                            });
                        }
                    }
                    showToast('تمت العملية، مطلوب التوقيع على الوصلات');
                    setCart([]); setForm({ cust: '', type: 'monthly', period: 10, guarantors: [] });
                } catch (e) { showToast('خطأ بالنظام', 'error'); }
            };

            const toggleGuarantor = (id) => {
                setForm(p => p.guarantors.includes(id) 
                    ? { ...p, guarantors: p.guarantors.filter(g => g !== id) }
                    : { ...p, guarantors: p.guarantors.length < 3 ? [...p.guarantors, id] : p.guarantors });
            };

            return (
                <div className="flex gap-6 h-full pb-10">
                    <div className="flex-[3] flex flex-col gap-4">
                        <div className="bg-white p-4 rounded-2xl shadow"><h2 className="text-xl font-black">POS</h2></div>
                        <div className="grid grid-cols-3 gap-4">
                            {products.map(p => (
                                <div key={p.id} onClick={() => addToCart(p)} className="glass p-5 rounded-2xl cursor-pointer hover:border-blue-500 border-2">
                                    <div className="font-bold">{p.name}</div>
                                    <div className="text-xs mt-2">مخزن: {p.stock}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="flex-[2] glass flex flex-col p-5 shadow-xl h-[80vh] overflow-y-auto">
                        <h2 className="font-black border-b pb-2 mb-4">العقد والسلة</h2>
                        {cart.map(i => <div key={i.id} className="flex justify-between p-2">{i.name} (x{i.qty}) <b>{formatMoney((form.type==='cash'?i.cash_price:i.installment_price)*i.qty)}</b></div>)}
                        
                        <Select label="العميل" options={customers.map(c=>({value:c.id, label:c.full_name}))} value={form.cust} onChange={e=>setForm({...form, cust:e.target.value})} className="mt-4" />
                        <Select label="النظام" options={[{value:'monthly', label:'شهري'}, {value:'daily', label:'يومي'}, {value:'cash', label:'كاش'}]} value={form.type} onChange={e=>setForm({...form, type:e.target.value})} className="mt-2" />
                        
                        {form.type !== 'cash' && (
                            <div className="mt-2">
                                <Input type="number" label="الشهور" value={form.period} onChange={e=>setForm({...form, period:Number(e.target.value)})} />
                                <div className="mt-4 border p-3 rounded-xl bg-slate-50">
                                    <label className="text-xs font-bold block mb-2">اختر الضامنين (بحد أقصى 3)</label>
                                    <div className="max-h-32 overflow-y-auto">
                                        {customers.filter(c => c.id !== form.cust).map(c => (
                                            <label key={c.id} className="flex items-center gap-2 text-sm p-1">
                                                <input type="checkbox" checked={form.guarantors.includes(c.id)} onChange={() => toggleGuarantor(c.id)} /> {c.full_name}
                                            </label>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        <div className="mt-4 p-4 bg-slate-900 text-white rounded-xl flex justify-between"><span>إجمالي:</span><b>{formatMoney(total)}</b></div>
                        {form.type !== 'cash' && total > 0 && <div className="mt-2 text-sm text-red-600 font-bold">التقديمة المطلوبة: {formatMoney(calcDownPayment())}</div>}
                        <Button onClick={executeSale} className="w-full mt-4" icon="Check">إصدار الفاتورة</Button>
                    </div>
                </div>
            );
        };

        const CollectionModule = ({ user }) => {
            const { showToast } = useAppContext();
            const [insts, setInsts] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [payInst, setPayInst] = useState(null);
            const [pAmt, setPAmt] = useState('');
            const [penAmt, setPenAmt] = useState('0');

            const load = useCallback(async () => {
                setInsts(await dbEngine.fetch('installments'));
                setCustomers(await dbEngine.fetch('customers'));
            }, []);
            useEffect(() => { load(); }, [load]);

            const custMap = useMemo(() => Object.fromEntries(customers.map(c => [c.id, c])), [customers]);

            const processed = useMemo(() => insts.filter(i => i.status !== 'paid').map(i => {
                const totalLateInvs = insts.filter(x => x.invoice_id === i.invoice_id && x.due_date < DateUtils.today()).length * 30; // تقدير التأخير التراكمي
                const status = DateUtils.getDelayStatus(i.due_date, i.type, totalLateInvs);
                return { ...i, ...status, remaining: i.amount - (i.paid_amount||0) };
            }), [insts]);

            const submitPay = async (e) => {
                e.preventDefault();
                const amt = Number(pAmt), pny = Number(penAmt);
                if (amt > payInst.remaining) return showToast('المبلغ أكبر من المتبقي', 'error');

                try {
                    const newPaid = Number(payInst.paid_amount || 0) + amt;
                    await dbEngine.update('installments', payInst.id, { ...payInst, paid_amount: newPaid, status: newPaid >= payInst.amount ? 'paid' : 'partial' });
                    
                    const inv = await dbEngine.get('sales_invoices', payInst.invoice_id);
                    // تسريع السداد الشرعي: يتم خصم الغرامة أيضاً من الإجمالي الباقي للفاتورة وليس كفائدة منفصلة تزيد الدين
                    const deduction = amt + pny; 
                    const newRem = Math.max(0, inv.remaining - deduction);
                    
                    let invStatus = inv.status;
                    if (newRem === 0) {
                        invStatus = 'بانتظار تسليم الأوراق'; // قاعدة الإغلاق
                        const c = await dbEngine.get('customers', payInst.customer_id);
                        await dbEngine.update('customers', c.id, {...c, status: 'غير نشط'});
                    }

                    await dbEngine.update('sales_invoices', inv.id, { ...inv, remaining: newRem, status: invStatus });
                    
                    if (newPaid >= payInst.amount) await LogicEngine.updateCustomerScore(payInst.customer_id, false);
                    else if (payInst.days > 0) await LogicEngine.updateCustomerScore(payInst.customer_id, true, payInst.days > 30 ? 20 : 5);

                    showToast('تم التحصيل وتخفيض أصل الدين'); setPayInst(null); load();
                } catch(e) { showToast('خطأ', 'error'); }
            };

            return (
                <div className="flex flex-col h-full pb-10 gap-4">
                    <div className="bg-white p-4 rounded-2xl shadow"><h2 className="text-xl font-black">التحصيلات والمتابعة</h2></div>
                    <div className="glass flex-1 overflow-auto">
                        <table className="w-full text-right text-sm">
                            <thead className="bg-slate-100 border-b"><tr><th className="p-4">العميل</th><th className="p-4">النظام</th><th className="p-4">الاستحقاق</th><th className="p-4">الحالة</th><th className="p-4">القسط</th><th className="p-4">إجراء</th></tr></thead>
                            <tbody className="bg-white divide-y">
                                {processed.map(i => (
                                    <tr key={i.id}>
                                        <td className="p-4 font-bold text-blue-700">{custMap[i.customer_id]?.full_name}</td>
                                        <td className="p-4">{i.type === 'daily' ? 'يومي' : 'شهري'}</td>
                                        <td className="p-4">{i.due_date}</td>
                                        <td className="p-4"><span className={`px-2 py-1 text-xs rounded ${i.color}`}>{i.label}</span></td>
                                        <td className="p-4 font-black">{formatMoney(i.remaining)}</td>
                                        <td className="p-4"><Button variant="success" className="py-1 px-3 text-xs" onClick={() => { setPayInst(i); setPAmt(i.remaining); setPenAmt('0'); }}>تحصيل</Button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    {payInst && (
                        <Modal title="تحصيل" isOpen={true} onClose={() => setPayInst(null)}>
                            <form onSubmit={submitPay} className="space-y-4">
                                <div className="text-sm font-bold text-red-600 mb-2">تنبيه: رسوم التأخير يتم خصمها من إجمالي الفاتورة لتسريع السداد (نظام شرعي)</div>
                                <Input type="number" label="دفع من القسط" value={pAmt} onChange={e=>setPAmt(e.target.value)} max={payInst.remaining} required />
                                <Input type="number" label="غرامة تأخير (تخصم من الأصل)" value={penAmt} onChange={e=>setPenAmt(e.target.value)} />
                                <Button type="submit" className="w-full">اعتماد</Button>
                            </form>
                        </Modal>
                    )}
                </div>
            );
        };

        const CRMModule = () => {
            const { showToast } = useAppContext();
            const [customers, setCustomers] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [form, setForm] = useState({ full_name:'', national_id:'', phone:'', address:'', job:'', income_source:'' });

            const load = async () => setCustomers(await dbEngine.fetch('customers'));
            useEffect(() => { load(); }, []);

            const save = async (e) => {
                e.preventDefault();
                if (!isValidPhone(form.phone)) return showToast('هاتف غير صحيح', 'error');
                if (!isValidNationalID(form.national_id)) return showToast('رقم قومي غير صحيح', 'error');
                
                try {
                    await dbEngine.insert('customers', { ...form, credit_score: 50, status: 'نشط' }); // التقييم يبدأ ب 50
                    showToast('تم التسجيل'); setIsModalOpen(false); load();
                } catch(e) { showToast('خطأ', 'error'); }
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow"><h2 className="text-xl font-black">العملاء والتقييم الائتماني</h2><Button icon="Plus" onClick={() => setIsModalOpen(true)}>تسجيل عميل</Button></div>
                    <div className="glass overflow-x-auto">
                        <table className="w-full text-right text-sm">
                            <thead className="bg-slate-100 border-b"><tr><th className="p-4">العميل</th><th className="p-4">العمل</th><th className="p-4">تقييم (يبدأ 50)</th><th className="p-4">الحالة</th></tr></thead>
                            <tbody className="bg-white divide-y">
                                {customers.map(c => (
                                    <tr key={c.id}>
                                        <td className="p-4 font-bold">{c.full_name} <br/><span className="text-xs text-slate-400">{c.phone}</span></td>
                                        <td className="p-4">{c.job} ({c.income_source})</td>
                                        <td className="p-4">
                                            <div className="flex items-center gap-2">
                                                <div className="w-24 bg-slate-200 h-2.5 rounded-full"><div className={`h-full ${c.credit_score > 70 ? 'bg-green-600' : c.credit_score >= 50 ? 'bg-blue-600' : 'bg-red-600'}`} style={{ width: `${c.credit_score}%` }}></div></div>
                                                <span className="text-xs font-black">{c.credit_score}%</span>
                                            </div>
                                        </td>
                                        <td className="p-4"><span className="px-2 py-1 bg-slate-100 rounded text-xs font-bold">{c.status}</span></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <Modal title="تسجيل تقييم مبدئي" isOpen={isModalOpen} onClose={() => setIsModalOpen(false)}>
                        <form onSubmit={save} className="space-y-4">
                            <Input label="الاسم" required value={form.full_name} onChange={e=>setForm({...form, full_name:e.target.value})} />
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="رقم قومي" required value={form.national_id} onChange={e=>setForm({...form, national_id:e.target.value})} />
                                <Input label="هاتف" required value={form.phone} onChange={e=>setForm({...form, phone:e.target.value})} />
                            </div>
                            <Input label="العنوان الفعلي" required value={form.address} onChange={e=>setForm({...form, address:e.target.value})} />
                            <div className="grid grid-cols-2 gap-4">
                                <Input label="الوظيفة" required value={form.job} onChange={e=>setForm({...form, job:e.target.value})} />
                                <Select label="مصدر الدخل" options={['حكومي ثابت', 'خاص ثابت', 'أعمال حرة']} required value={form.income_source} onChange={e=>setForm({...form, income_source:e.target.value})} />
                            </div>
                            <Button type="submit" className="w-full">تسجيل للتقييم</Button>
                        </form>
                    </Modal>
                </div>
            );
        };

        const DashboardModule = () => <div className="p-6 bg-white rounded-2xl shadow font-black text-xl">لوحة القيادة - قريباً سيتم ربطها بالإحصائيات الجديدة المتقدمة</div>;
        const LegalModule = () => <div className="p-6 bg-white rounded-2xl shadow font-black text-xl">الشؤون القانونية - إدارة ملفات الـ 6 قضايا لكل متهم</div>;
        const InventoryModule = () => <div className="p-6 bg-white rounded-2xl shadow font-black text-xl">المخازن (مفعل بالخلفية)</div>;

        // MAIN APP
        function App() {
            const [ready, setReady] = useState(false);
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('sales');

            const MENU = [
                { id: 'dashboard', label: 'الرؤية العامة', icon: 'Dashboard' },
                { id: 'sales', label: 'المبيعات والعقود', icon: 'ShoppingCart' },
                { id: 'collection', label: 'التحصيلات', icon: 'Wallet' },
                { id: 'customers', label: 'إدارة العملاء', icon: 'Users' },
                { id: 'inventory', label: 'المخازن', icon: 'Inventory' },
                { id: 'legal', label: 'الشؤون القانونية', icon: 'Legal' }
            ];

            useEffect(() => { dbEngine.init().then(() => setReady(true)); }, []);

            if (!ready) return <div className="h-screen flex items-center justify-center bg-slate-900 text-white"><div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div></div>;
            if (!user) return <UIProvider><LoginModule onLogin={setUser} /></UIProvider>;

            return (
                <UIProvider>
                    <div className="flex h-screen overflow-hidden text-slate-800 bg-slate-100">
                        <aside className="w-72 bg-slate-900 flex flex-col shadow-2xl z-50 shrink-0">
                            <div className="p-6 border-b border-slate-800 flex items-center gap-4">
                                <div className="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500 to-blue-700 text-white flex items-center justify-center font-black text-2xl">X</div>
                                <div><h1 className="text-xl font-black text-white leading-none">EcoFine ERP</h1><p className="text-[10px] mt-1 text-blue-400 font-bold uppercase">X-Holding V6 (Sharia)</p></div>
                            </div>
                            <nav className="flex-1 p-4 space-y-2">
                                {MENU.map(m => (
                                    <button key={m.id} onClick={() => setActiveTab(m.id)} className={`w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-bold transition-all ${activeTab === m.id ? 'bg-blue-600 text-white shadow-lg translate-x-1' : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}><Icon name={m.icon} size={20} /> {m.label}</button>
                                ))}
                            </nav>
                        </aside>
                        <main className="flex-1 flex flex-col overflow-hidden relative">
                            <header className="h-20 glass border-b flex items-center px-8 z-10 sticky top-0"><h1 className="text-2xl font-black">{MENU.find(m => m.id === activeTab)?.label}</h1></header>
                            <div className="flex-1 overflow-y-auto p-4 md:p-8">
                                {activeTab === 'dashboard' && <DashboardModule />}
                                {activeTab === 'sales' && <SalesModule user={user} />}
                                {activeTab === 'collection' && <CollectionModule user={user} />}
                                {activeTab === 'customers' && <CRMModule />}
                                {activeTab === 'inventory' && <InventoryModule />}
                                {activeTab === 'legal' && <LegalModule />}
                            </div>
                        </main>
                    </div>
                </UIProvider>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
