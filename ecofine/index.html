    <style>
        /* 🎨 نظام الثيمات الديناميكي */
        :root { 
            --bg-main: #f8fafc; 
            --bg-card: #ffffff; 
            --text-primary: #0f172a; 
            --accent-blue: #2563eb; 
            --sidebar-bg: #0f172a;
        }

        /* الثيم المستقبلي (السيادي) */
        [data-theme='futuristic'] {
            --bg-main: #05010d;
            --bg-card: #0d041a;
            --text-primary: #f8fafc;
            --accent-blue: #a855f7; /* تم استبدال الأزرق بالأرجواني النيون هنا */
            --sidebar-bg: #090214;
        }

        body { 
            font-family: 'IBM Plex Sans Arabic', sans-serif; 
            background: var(--bg-main); 
            color: var(--text-primary);
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        
        .custom-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent-blue); }
        
        .animate-in { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        #splash-screen {
            position: fixed; inset: 0; background: var(--sidebar-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 99999; transition: opacity 0.6s ease-out, visibility 0.6s;
        }

        /* 🖨️ إعدادات الطباعة السيادية */
        @media print {
            body * { visibility: hidden; }
            #printable-report, #printable-report * { visibility: visible; }
            #printable-report {
                position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0;
            }
            .print\:hidden { display: none !important; }
        }
    </style>
</head>
