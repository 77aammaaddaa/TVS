<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الحضور والإنصراف</title>
</head>
<body class="antialiased overflow-hidden selection:bg-blue-500 selection:text-white">

    <div id="attendance-form-container" class="p-6 bg-slate-900 rounded-[2.5rem] shadow-sm border border-slate-100 w-full mx-auto max-w-md text-center mt-4">
        <h2 class="text-xl font-black mb-4">تسجيل الحضور والإنصراف</h2>
        <input type="text" id="name" placeholder="اسم العامل" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm mb-3" />
        <select id="type" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all shadow-sm mb-3">
            <option value="حضور">حضور</option>
            <option value="انصراف">انصراف</option>
        </select>
        <button id="submitBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white px-4 py-2 rounded-2xl font-black text-xs shadow-xl transition-colors active:scale-95">تسجيل</button>
    </div>

    <script src="attendance.js"></script>
</body>
</html>
